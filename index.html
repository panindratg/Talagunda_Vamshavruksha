<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e17">
<title>Talagunda Family Tree</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e17;--bg2:#1a1930;--sf:#1e1d2f;--sf2:#272640;
  --ink:#fffffe;--iks:#a7a9be;--ikd:#6b6d7b;
  --gold:#c9a84c;--gold2:#e8d48b;--goldbg:rgba(201,168,76,.08);
  --cm:#2a3a5c;--cf:#4a2a3c;--cu:#3a3428;
  --bm:#4a7ab5;--bf:#b54a7a;--bu:#8a7a5a;
  --bd:#2a2940;--bdl:#3a3958;
  --r:10px;--rs:6px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html{height:100%;-webkit-text-size-adjust:100%}
body{min-height:100%;background:var(--bg);color:var(--ink);font-family:'Source Sans 3',system-ui,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ─── TOP BAR ─── */
#top{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;
  background:linear-gradient(180deg,rgba(15,14,23,.98),rgba(15,14,23,.85));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:8px}
#top h1{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;letter-spacing:.02em}
#top h1 span{color:var(--gold)}
.sep{flex:1}
.tb{background:transparent;border:1px solid var(--bd);color:var(--iks);padding:6px 12px;border-radius:var(--rs);
  font-family:'Source Sans 3',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.tb:hover,.tb:active{border-color:var(--gold);color:var(--gold);background:var(--goldbg)}
.tb.p{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600}
.tb.p:hover{background:var(--gold2)}

/* ─── SEARCH BAR ─── */
#sbar{position:fixed;top:52px;left:0;right:0;z-index:90;padding:8px 12px;
  background:linear-gradient(180deg,rgba(15,14,23,.95),rgba(15,14,23,0));
  display:flex;gap:6px;align-items:center}
#si{flex:1;background:var(--sf);border:1px solid var(--bd);color:var(--ink);padding:9px 14px;
  border-radius:20px;font-family:'Source Sans 3',sans-serif;font-size:.85rem;outline:0;
  transition:border-color .2s}
#si:focus{border-color:var(--gold)}
#si::placeholder{color:var(--ikd)}
#scount{font-size:.7rem;color:var(--ikd);white-space:nowrap}

/* ─── FILTER PILLS ─── */
#fpills{position:fixed;top:100px;left:0;right:0;z-index:85;padding:0 12px 6px;
  display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#fpills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:4px 12px;border-radius:14px;border:1px solid var(--bd);
  background:transparent;color:var(--iks);font-size:.7rem;font-weight:500;cursor:pointer;
  font-family:'Source Sans 3',sans-serif;transition:all .2s;white-space:nowrap}
.pill:hover,.pill:active{border-color:var(--gold);color:var(--gold)}
.pill.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600}

/* ─── GENERATION LANES ─── */
#lanes{padding-top:136px;padding-bottom:calc(80px + var(--safe-b));overflow-y:auto;height:100vh}
.glane{margin-bottom:4px}
.glabel{font-family:'Playfair Display',serif;font-size:.72rem;font-weight:600;color:var(--ikd);
  padding:10px 14px 4px;letter-spacing:.12em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px}
.glabel::after{content:'';flex:1;height:1px;background:var(--bd)}
.gcnt{font-family:'Source Sans 3',sans-serif;font-weight:400;color:var(--ikd);font-size:.6rem;letter-spacing:0}
.grow{display:flex;gap:8px;padding:4px 14px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.grow::-webkit-scrollbar{display:none}

/* ─── PERSON CARD (in lanes) ─── */
.pc{flex-shrink:0;width:140px;padding:10px 12px;border-radius:var(--r);cursor:pointer;
  border:1.5px solid var(--bd);transition:all .25s ease;position:relative;overflow:hidden}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.pc.gm{background:var(--cm)}.pc.gm::before{background:var(--bm)}
.pc.gf{background:var(--cf)}.pc.gf::before{background:var(--bf)}
.pc.gu{background:var(--cu)}.pc.gu::before{background:var(--bu)}
.pc:hover,.pc:active{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 20px rgba(201,168,76,.15)}
.pc.lit{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.3),0 4px 20px rgba(201,168,76,.15)}
.pc.hid{display:none}
.cn{font-family:'Playfair Display',serif;font-size:.82rem;font-weight:600;line-height:1.25;color:var(--ink);margin-bottom:2px}
.csub{font-size:.62rem;color:var(--iks);display:flex;align-items:center;gap:4px}
.csp{display:inline-block;width:4px;height:4px;border-radius:50%;flex-shrink:0}
.csp.m{background:var(--bm)}.csp.f{background:var(--bf)}.csp.u{background:var(--bu)}
.ckids{font-size:.58rem;color:var(--ikd);margin-top:3px}

/* ─── FOCUS VIEW (the innovative constellation) ─── */
#fv{position:fixed;inset:0;z-index:500;display:none;flex-direction:column;
  background:rgba(8,7,14,.96);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  overflow-y:auto;-webkit-overflow-scrolling:touch}
#fv.open{display:flex}

#fv-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
#fv-bg canvas{width:100%;height:100%}

#fv-close{position:fixed;top:12px;right:12px;z-index:510;width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--ink);
  font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s}
#fv-close:hover{background:rgba(255,255,255,.15)}

#fv-content{position:relative;z-index:5;padding:60px 16px calc(40px + var(--safe-b));
  max-width:480px;margin:0 auto;width:100%}

/* Focus: Section labels */
.fv-sec{font-family:'Playfair Display',serif;font-size:.62rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--gold);margin:20px 0 8px;text-align:center}
.fv-sec:first-child{margin-top:0}

/* Focus: Center person */
.fv-hero{text-align:center;padding:24px 16px;margin:0 auto 8px;
  background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));
  border:1.5px solid rgba(201,168,76,.3);border-radius:16px;position:relative;
  animation:fvFadeUp .5s ease both}
.fv-hero::before{content:'';position:absolute;inset:-1px;border-radius:16px;
  background:linear-gradient(135deg,rgba(201,168,76,.2),transparent);z-index:-1;filter:blur(20px)}
.fv-hero .cn{font-size:1.3rem;margin-bottom:4px}
.fv-hero .csub{justify-content:center;font-size:.78rem}

/* Focus: Connection line */
.fv-line{height:24px;display:flex;justify-content:center;align-items:center}
.fv-line::before{content:'';width:1.5px;height:100%;background:linear-gradient(180deg,var(--gold),rgba(201,168,76,.2))}

/* Focus: Family cards */
.fv-card{display:flex;align-items:center;gap:10px;padding:12px 14px;
  border-radius:var(--r);border:1px solid var(--bd);margin-bottom:6px;cursor:pointer;
  transition:all .25s;position:relative;overflow:hidden;animation:fvFadeUp .4s ease both}
.fv-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px}
.fv-card.gm{background:rgba(42,58,92,.5)}.fv-card.gm::before{background:var(--bm)}
.fv-card.gf{background:rgba(74,42,60,.5)}.fv-card.gf::before{background:var(--bf)}
.fv-card.gu{background:rgba(58,52,40,.5)}.fv-card.gu::before{background:var(--bu)}
.fv-card:hover,.fv-card:active{border-color:var(--gold);transform:translateX(4px)}
.fv-card .cn{font-size:.88rem;margin:0}
.fv-card .csub{font-size:.68rem}
.fv-card .fv-rel{font-size:.58rem;color:var(--gold);font-weight:600;letter-spacing:.08em;text-transform:uppercase}

/* Focus: Spouse group */
.fv-spgrp{margin:12px 0;padding:12px;border-radius:var(--r);border:1px solid var(--bd);
  background:rgba(255,255,255,.02)}
.fv-spgrp-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px solid var(--bd)}
.fv-spgrp-head .cn{font-size:.78rem;color:var(--iks)}
.fv-spgrp-head .csp{width:6px;height:6px}
.fv-spgrp-label{font-size:.56rem;color:var(--ikd);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.fv-nochildren{text-align:center;padding:12px;color:var(--ikd);font-size:.75rem;font-style:italic}

/* Focus: Action buttons */
.fv-actions{display:flex;gap:6px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.fv-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--bd);background:var(--sf);
  color:var(--iks);font-family:'Source Sans 3',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s}
.fv-btn:hover{border-color:var(--gold);color:var(--gold)}
.fv-btn.accent{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* Animations */
@keyframes fvFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ─── FORM MODAL ─── */
.ov{position:fixed;inset:0;z-index:600;background:rgba(8,7,14,.8);display:none;
  align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.ov.op{display:flex}
.mo{background:var(--sf);border:1px solid var(--bd);border-radius:16px 16px 0 0;
  padding:20px 16px calc(20px + var(--safe-b));width:100%;max-width:480px;max-height:85vh;
  overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mo h2{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:14px}
.rw{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.rw.f{grid-template-columns:1fr}
.fl{display:flex;flex-direction:column;gap:3px}
.fl label{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ikd);font-weight:600}
.fl input,.fl select,.fl textarea{background:var(--bg);border:1px solid var(--bd);color:var(--ink);
  padding:8px 10px;border-radius:var(--rs);font-family:'Source Sans 3',sans-serif;font-size:.85rem;outline:0}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--gold)}
.fl textarea{resize:vertical;min-height:40px}
.ma{display:flex;gap:6px;margin-top:14px;justify-content:flex-end}
.ok{background:var(--gold);border:0;color:var(--bg);padding:8px 20px;border-radius:20px;
  font-family:'Source Sans 3',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer}
.ok:hover{background:var(--gold2)}
.ca{background:transparent;border:1px solid var(--bd);color:var(--iks);padding:8px 16px;
  border-radius:20px;font-size:.82rem;cursor:pointer}.ca:hover{border-color:var(--ikd)}

/* ─── EXPORT MODAL ─── */
#expo .mo{border-radius:16px 16px 0 0}
#etxt{width:100%;height:200px;border:1px solid var(--bd);border-radius:var(--rs);padding:8px;
  font-family:'Courier New',monospace;font-size:.6rem;background:var(--bg);color:var(--ink);
  resize:vertical;outline:0}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:calc(20px + var(--safe-b));left:50%;transform:translateX(-50%);
  background:var(--sf);border:1px solid var(--bd);color:var(--ink);padding:8px 18px;
  border-radius:20px;font-size:.78rem;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:tu .2s ease,to .3s ease 1.8s forwards}
.toast.ok{border-color:rgba(100,180,100,.4);color:#8fd8a0}
.toast.w{border-color:rgba(200,160,60,.4);color:var(--gold2)}
@keyframes tu{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes to{to{opacity:0}}

/* ─── STATS BAR ─── */
#stats{position:fixed;bottom:0;left:0;right:0;z-index:80;
  background:linear-gradient(0deg,rgba(15,14,23,.98),rgba(15,14,23,.85));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);padding:8px 16px calc(8px + var(--safe-b));
  display:flex;align-items:center;justify-content:space-between}
.stat{font-size:.65rem;color:var(--ikd)}.stat b{color:var(--gold);font-weight:600}

/* ─── DESKTOP ─── */
@media(min-width:768px){
  #lanes{max-width:1200px;margin:0 auto}
  .pc{width:160px}
  .mo{border-radius:16px;max-width:420px;margin-bottom:40px}
  #fv-content{padding-top:80px;max-width:520px}
}

/* scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="top">
  <h1>Talagunda <span>&middot;</span> Family</h1>
  <div class="sep"></div>
  <button class="tb" onclick="openForm(null,'new')">+ Add</button>
  <button class="tb" onclick="openExport()">Export</button>
</div>

<!-- SEARCH -->
<div id="sbar">
  <input id="si" placeholder="Search by name&hellip;" autocomplete="off">
  <span id="scount"></span>
</div>

<!-- FILTER PILLS -->
<div id="fpills">
  <button class="pill on" data-f="all" onclick="setFilter(this)">All</button>
  <button class="pill" data-f="m" onclick="setFilter(this)">&#9794; Male</button>
  <button class="pill" data-f="f" onclick="setFilter(this)">&#9792; Female</button>
</div>

<!-- GENERATION LANES -->
<div id="lanes"></div>

<!-- BOTTOM STATS -->
<div id="stats">
  <span class="stat"><b id="st-total">0</b> people &middot; <b id="st-gen">0</b> generations</span>
  <button class="tb" onclick="saveData()" style="padding:4px 10px;font-size:.65rem">Save</button>
</div>

<!-- FOCUS VIEW -->
<div id="fv">
  <div id="fv-bg"><canvas id="fv-canvas"></canvas></div>
  <button id="fv-close" onclick="closeFV()">&times;</button>
  <div id="fv-content"></div>
</div>

<!-- FORM -->
<div class="ov" id="fo">
  <div class="mo">
    <h2 id="ft">Add Person</h2>
    <div class="rw f"><div class="fl"><label>Name</label><input id="fn" placeholder="Full name"></div></div>
    <div class="rw">
      <div class="fl"><label>Gender</label><select id="fg"><option value="m">Male</option><option value="f">Female</option><option value="u">Unknown</option></select></div>
      <div class="fl"><label>Generation</label><input id="fgen" type="number" placeholder="e.g. 7"></div>
    </div>
    <div class="rw">
      <div class="fl"><label>Birth Year</label><input id="fb" type="number" placeholder="Year"></div>
      <div class="fl"><label>Death Year</label><input id="fd" type="number" placeholder="Year"></div>
    </div>
    <div class="rw f"><div class="fl"><label>Place</label><input id="fp" placeholder="Place"></div></div>
    <div class="rw f"><div class="fl"><label>Notes</label><textarea id="fno" placeholder="Notes"></textarea></div></div>
    <div id="frs">
      <div class="rw">
        <div class="fl"><label>Relation Type</label><select id="frt"><option value="child">Child of</option><option value="spouse">Spouse of</option><option value="parent">Parent of</option></select></div>
        <div class="fl"><label>Of Whom</label><select id="frw"></select></div>
      </div>
      <div class="rw f" id="fspouse-row" style="display:none">
        <div class="fl"><label>Via Spouse (for multi-wife/husband)</label><select id="fsp"><option value="">— Not specified —</option></select></div>
      </div>
    </div>
    <div class="ma"><button class="ca" onclick="closeForm()">Cancel</button><button class="ok" id="fsb" onclick="submitForm()">Add</button></div>
  </div>
</div>

<!-- EXPORT -->
<div class="ov" id="expo">
  <div class="mo">
    <h2>Export Data</h2>
    <p style="font-size:.75rem;color:var(--ikd);margin-bottom:8px">Copy this code &rarr; paste into your GitHub repo's index.html</p>
    <textarea id="etxt" readonly></textarea>
    <div class="ma"><button class="ca" onclick="closeExport()">Close</button><button class="ok" onclick="copyExport()">Copy</button></div>
  </div>
</div>

const byId=id=>people.find(p=>p.id===id);
const gCh=id=>{const s=new Set();relations.filter(r=>(r.type==='parent')&&r.parent===id).forEach(r=>s.add(r.child));return[...s]};
const gPa=id=>relations.filter(r=>(r.type==='parent')&&r.child===id).map(r=>r.parent);
const gSp=id=>{const s=new Set();relations.filter(r=>r.type==='spouse'&&(r.a===id||r.b===id)).forEach(r=>s.add(r.a===id?r.b:r.a));return[...s]};

// Multi-spouse: get children attributed to a specific spouse
function childrenViaSpouse(personId, spouseId){
  return relations.filter(r=>r.type==='parent'&&r.parent===personId&&r.spouse===spouseId).map(r=>r.child);
}
// Get all children grouped by spouse
function childrenGrouped(personId){
  const spouses=gSp(personId);
  const allKids=gCh(personId);
  if(spouses.length<=1) return [{spouse:spouses[0]||null, kids:allKids}];
  const groups=[];const claimed=new Set();
  spouses.forEach(sp=>{
    const viaKids=relations.filter(r=>r.type==='parent'&&r.parent===personId&&r.spouse===sp).map(r=>r.child);
    if(viaKids.length){groups.push({spouse:sp,kids:viaKids});viaKids.forEach(k=>claimed.add(k))}
  });
  const unclaimed=allKids.filter(k=>!claimed.has(k));
  if(unclaimed.length) groups.push({spouse:null,kids:unclaimed});
  if(!groups.length) groups.push({spouse:null,kids:allKids});
  return groups;
}

// Combined children (person + all spouses)
function famCh(id){const k=new Set();gCh(id).forEach(c=>k.add(c));gSp(id).forEach(s=>gCh(s).forEach(c=>k.add(c)));return[...k]}

// ─── RENDER LANES ───
const GEN_NAMES=['Gen 0','Gen I','Gen II','Gen III','Gen IV','Gen V','Gen VI','Gen VII','Gen VIII','Gen IX','Gen X','Gen XI'];
function renderLanes(){
  const lanes=document.getElementById('lanes');
  const q=curSearch.toLowerCase().trim();
  const gens={};
  people.forEach(p=>{
    if(curFilter!=='all'&&p.gender!==curFilter)return;
    if(q&&!p.name.toLowerCase().includes(q))return;
    const g=p.generation||0;if(!gens[g])gens[g]=[];gens[g].push(p)
  });
  let h='';
  Object.keys(gens).sort((a,b)=>a-b).forEach(g=>{
    const ps=gens[g];
    h+=`<div class="glane"><div class="glabel">${GEN_NAMES[+g]||'Gen '+g} <span class="gcnt">${ps.length}</span></div><div class="grow">`;
    ps.forEach(p=>{
      const gc=p.gender==='m'?'gm':p.gender==='f'?'gf':'gu';
      const sc=p.gender==='m'?'m':p.gender==='f'?'f':'u';
      const sp=gSp(p.id);const ck=famCh(p.id);
      const spName=sp.length?sp.map(s=>{const x=byId(s);return x?x.name:''}).join(', '):'';
      const litClass=q&&p.name.toLowerCase().includes(q)?' lit':'';
      h+=`<div class="pc ${gc}${litClass}" onclick="openFV('${p.id}')">`;
      h+=`<div class="cn">${esc(p.name)}</div>`;
      if(spName)h+=`<div class="csub"><span class="csp ${sc}"></span>${esc(spName)}</div>`;
      if(ck.length)h+=`<div class="ckids">${ck.length} ${ck.length===1?'child':'children'}</div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  if(!h)h='<div style="text-align:center;padding:60px 20px;color:var(--ikd)">No matches found</div>';
  lanes.innerHTML=h;
  const genSet=new Set(people.map(p=>p.generation||0));
  document.getElementById('st-total').textContent=people.length;
  document.getElementById('st-gen').textContent=genSet.size;
  document.getElementById('scount').textContent=people.length+' people';
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function setFilter(btn){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');curFilter=btn.dataset.f;renderLanes()
}
document.getElementById('si').addEventListener('input',e=>{curSearch=e.target.value;renderLanes()});

// ─── FOCUS VIEW ───
function openFV(id){
  selId=id;const p=byId(id);if(!p)return;
  const fv=document.getElementById('fv');fv.classList.add('open');
  document.body.style.overflow='hidden';
  renderFV(id);initStars()
}
function closeFV(){
  document.getElementById('fv').classList.remove('open');
  document.body.style.overflow='';selId=null
}
function refocusFV(id){renderFV(id);selId=id;document.getElementById('fv-content').scrollTop=0}

function renderFV(id){
  const p=byId(id);if(!p)return;
  const parents=gPa(id).map(x=>byId(x)).filter(Boolean);
  const spouses=gSp(id).map(x=>byId(x)).filter(Boolean);
  const kidGroups=childrenGrouped(id);
  const allKids=famCh(id);
  let d=0;
  let h='';

  // Parents
  if(parents.length){
    h+=`<div class="fv-sec">Parents</div>`;
    parents.forEach(pa=>{h+=fvCard(pa,'Parent',d);d++})
  }

  // Connecting line
  if(parents.length)h+=`<div class="fv-line"></div>`;

  // HERO
  const gc=p.gender==='m'?'m':p.gender==='f'?'f':'u';
  const yr=p.birth?(p.death?p.birth+'–'+p.death:'b. '+p.birth):'';
  h+=`<div class="fv-hero" style="animation-delay:${d*60}ms">`;
  h+=`<div class="cn">${esc(p.name)}</div>`;
  h+=`<div class="csub"><span class="csp ${gc}"></span>${yr}${p.occ?' · '+esc(p.occ):''}${p.place?' · '+esc(p.place):''}</div>`;
  if(p.notes)h+=`<div style="font-size:.72rem;color:var(--ikd);margin-top:6px">${esc(p.notes)}</div>`;
  h+=`</div>`;d++;

  // Spouses
  if(spouses.length){
    h+=`<div class="fv-sec">${spouses.length>1?'Spouses':'Spouse'}</div>`;
    spouses.forEach((sp,i)=>{h+=fvCard(sp,spouses.length>1?'Spouse '+(i+1):'Spouse',d);d++})
  }

  // Children (grouped by spouse if multiple spouses)
  if(allKids.length){
    h+=`<div class="fv-sec">Children · ${allKids.length}</div>`;
    if(spouses.length>1){
      // Multi-spouse: group children
      kidGroups.forEach(grp=>{
        const sp=grp.spouse?byId(grp.spouse):null;
        const gc2=sp?(sp.gender==='m'?'m':'f'):'u';
        h+=`<div class="fv-spgrp">`;
        if(sp){
          h+=`<div class="fv-spgrp-head"><span class="csp ${gc2}"></span><div class="cn">${esc(sp.name)}</div></div>`;
          h+=`<div class="fv-spgrp-label">Children with ${esc(sp.name)}</div>`;
        }else{
          h+=`<div class="fv-spgrp-label">Children (spouse not specified)</div>`;
        }
        grp.kids.forEach(kid=>{const k=byId(kid);if(k){h+=fvCard(k,'Child',d);d++}});
        h+=`</div>`;
      })
    }else{
      allKids.forEach(kid=>{const k=byId(kid);if(k){h+=fvCard(k,'Child',d);d++}})
    }
  }

  // Actions
  h+=`<div class="fv-actions">`;
  h+=`<button class="fv-btn" onclick="closeFV();openForm('${id}','edit')">Edit</button>`;
  h+=`<button class="fv-btn" onclick="closeFV();openForm('${id}','spouse')">+ Spouse</button>`;
  h+=`<button class="fv-btn accent" onclick="closeFV();openForm('${id}','child')">+ Child</button>`;
  h+=`<button class="fv-btn" style="color:#e06060;border-color:rgba(224,96,96,.3)" onclick="delPerson('${id}')">Remove</button>`;
  h+=`</div>`;

  document.getElementById('fv-content').innerHTML=h
}

function fvCard(p,rel,delay){
  const gc=p.gender==='m'?'gm':p.gender==='f'?'gf':'gu';
  const yr=p.birth?(p.death?p.birth+'–'+p.death:'b. '+p.birth):'';
  return `<div class="fv-card ${gc}" style="animation-delay:${delay*60}ms" onclick="refocusFV('${p.id}')">
    <div style="flex:1"><div class="fv-rel">${rel}</div><div class="cn">${esc(p.name)}</div>
    ${yr?`<div class="csub">${yr}</div>`:''}</div>
    <span style="color:var(--ikd);font-size:1.1rem">›</span></div>`
}

// ─── STARFIELD ───
let starCtx,stars=[];
function initStars(){
  const c=document.getElementById('fv-canvas');const w=c.width=window.innerWidth;const h=c.height=window.innerHeight;
  starCtx=c.getContext('2d');stars=[];
  for(let i=0;i<60;i++)stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+.3,a:Math.random(),s:Math.random()*.003+.001});
  drawStars()
}
function drawStars(){
  if(!document.getElementById('fv').classList.contains('open'))return;
  const c=document.getElementById('fv-canvas');starCtx.clearRect(0,0,c.width,c.height);
  stars.forEach(s=>{s.a+=s.s;if(s.a>1)s.s=-Math.abs(s.s);if(s.a<.1)s.s=Math.abs(s.s);
    starCtx.beginPath();starCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    starCtx.fillStyle=`rgba(201,168,76,${s.a*.3})`;starCtx.fill()});
  requestAnimationFrame(drawStars)
}

// ─── FORM ───
function openForm(id,mode){
  formMode=mode;formTarget=id;
  const rs=document.getElementById('frs');const spRow=document.getElementById('fspouse-row');
  document.getElementById('ft').textContent={edit:'Edit Person',child:'Add Child',spouse:'Add Spouse',parent:'Add Parent',new:'Add Person'}[mode]||'Add';
  document.getElementById('fsb').textContent=mode==='edit'?'Save':'Add';
  if(mode==='edit'){
    const p=byId(id);
    document.getElementById('fn').value=p.name||'';document.getElementById('fg').value=p.gender||'m';
    document.getElementById('fgen').value=p.generation||0;
    document.getElementById('fb').value=p.birth||'';document.getElementById('fd').value=p.death||'';
    document.getElementById('fp').value=p.place||'';document.getElementById('fno').value=p.notes||'';
    rs.style.display='none';spRow.style.display='none'
  }else{
    ['fn','fb','fd','fp','fno'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('fg').value='m';document.getElementById('fgen').value='';
    rs.style.display='';
    const s=document.getElementById('frw');
    s.innerHTML=people.map(p=>`<option value="${p.id}">${p.name} (Gen ${p.generation||0})</option>`).join('');
    if(id)s.value=id;
    document.getElementById('frt').value={child:'child',spouse:'spouse',parent:'parent',new:'child'}[mode]||'child';
    // Auto-set generation
    if(id&&mode==='child'){const pa=byId(id);document.getElementById('fgen').value=(pa.generation||0)+1}
    if(id&&mode==='parent'){const ch=byId(id);document.getElementById('fgen').value=(ch.generation||0)-1}
    if(id&&mode==='spouse'){const sp=byId(id);document.getElementById('fgen').value=sp.generation||0}
    // Multi-spouse: show spouse picker when adding child to person with multiple spouses
    updateSpousePicker()
  }
  document.getElementById('fo').classList.add('op');
  setTimeout(()=>document.getElementById('fn').focus(),100)
}
function updateSpousePicker(){
  const spRow=document.getElementById('fspouse-row');
  const rt=document.getElementById('frt').value;
  const rw=document.getElementById('frw').value;
  if(rt==='child'&&rw){
    const sps=gSp(rw);
    if(sps.length>1){
      const sel=document.getElementById('fsp');
      sel.innerHTML='<option value="">— Not specified —</option>'+sps.map(s=>{const p=byId(s);return p?`<option value="${s}">${p.name}</option>`:''}).join('');
      spRow.style.display='';return
    }
  }
  spRow.style.display='none'
}
document.getElementById('frt').addEventListener('change',updateSpousePicker);
document.getElementById('frw').addEventListener('change',updateSpousePicker);

function closeForm(){document.getElementById('fo').classList.remove('op')}
function submitForm(){
  const name=document.getElementById('fn').value.trim();if(!name){toast('Enter a name','w');return}
  const gender=document.getElementById('fg').value;
  const gen=parseInt(document.getElementById('fgen').value)||0;
  const birth=parseInt(document.getElementById('fb').value)||null;
  const death=parseInt(document.getElementById('fd').value)||null;
  const place=document.getElementById('fp').value.trim();
  const notes=document.getElementById('fno').value.trim();
  if(formMode==='edit'){
    Object.assign(byId(formTarget),{name,gender,generation:gen,birth,death,place,notes});
    closeForm();renderLanes();saveData();toast(name+' updated','ok');return
  }
  const rt=document.getElementById('frt').value;
  const rw=document.getElementById('frw').value;
  const spVal=document.getElementById('fsp').value;
  const nid='p'+Date.now();
  people.push({id:nid,name,gender,birth,death,occ:'',place,notes,generation:gen});
  if(rw){
    if(rt==='child'){
      const rel={type:'parent',parent:rw,child:nid};
      if(spVal)rel.spouse=spVal;  // MULTI-SPOUSE ATTRIBUTION
      relations.push(rel)
    }else if(rt==='parent'){relations.push({type:'parent',parent:nid,child:rw})}
    else{relations.push({type:'spouse',a:rw,b:nid})}
  }
  closeForm();renderLanes();saveData();toast(name+' added','ok')
}

function delPerson(id){
  const p=byId(id);if(!confirm('Remove "'+p.name+'"?'))return;
  closeFV();
  const idx=people.findIndex(x=>x.id===id);if(idx>=0)people.splice(idx,1);
  for(let i=relations.length-1;i>=0;i--){
    const r=relations[i];
    if(r.parent===id||r.child===id||r.a===id||r.b===id)relations.splice(i,1)
  }
  renderLanes();saveData();toast(p.name+' removed','ok')
}

// ─── EXPORT ───
function openExport(){
  let c='let people=[\n';
  people.forEach((p,i)=>{
    const n=p.name.replace(/'/g,"\\'"),o=(p.occ||'').replace(/'/g,"\\'"),pl=(p.place||'').replace(/'/g,"\\'"),no=(p.notes||'').replace(/'/g,"\\'");
    c+=`  {id:'${p.id}',name:'${n}',gender:'${p.gender}',birth:${p.birth||'null'},death:${p.death||'null'},occ:'${o}',place:'${pl}',notes:'${no}',generation:${p.generation||0}}${i<people.length-1?',':''}\n`
  });
  c+='];  // END PEOPLE\n\nlet relations=[\n';
  relations.forEach((r,i)=>{
    if(r.type==='spouse')c+=`  {type:'spouse',a:'${r.a}',b:'${r.b}'}${i<relations.length-1?',':''}\n`;
    else{
      let s=`  {type:'${r.type}',parent:'${r.parent}',child:'${r.child}'`;
      if(r.spouse)s+=`,spouse:'${r.spouse}'`;
      c+=s+`}${i<relations.length-1?',':''}\n`
    }
  });
  c+='];  // END RELATIONS';
  document.getElementById('etxt').value=c;document.getElementById('expo').classList.add('op')
}
function closeExport(){document.getElementById('expo').classList.remove('op')}
function copyExport(){
  const t=document.getElementById('etxt');t.select();t.setSelectionRange(0,99999);
  navigator.clipboard.writeText(t.value).then(()=>toast('Copied!','ok')).catch(()=>{document.execCommand('copy');toast('Copied!','ok')})
}

// ─── SAVE/LOAD ───
const SK='talagunda_v5';
function saveData(){try{localStorage.setItem(SK,JSON.stringify({people,relations}));toast('Saved','ok');return true}catch(e){toast('Error saving','w');return false}}
function loadData(){try{const r=localStorage.getItem(SK);if(!r)return false;const d=JSON.parse(r);if(d.people&&d.relations){people=d.people;relations=d.relations;return true}}catch(e){}return false}
function toast(m,t){document.querySelectorAll('.toast').forEach(x=>x.remove());const d=document.createElement('div');d.className='toast'+(t?' '+t:'');d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2500)}

// ─── GEN FILTER PILLS ───
function addGenPills(){
  const fp=document.getElementById('fpills');
  const genSet=new Set(people.map(p=>p.generation||0));
  [...genSet].sort((a,b)=>a-b).forEach(g=>{
    const pill=document.createElement('button');pill.className='pill';pill.dataset.f='gen'+g;
    pill.textContent=GEN_NAMES[g]||'Gen '+g;
    pill.onclick=function(){
      document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
      // If already filtering this gen, reset to all
      if(curFilter==='gen'+g){curFilter='all';document.querySelector('.pill[data-f="all"]').classList.add('on')}
      else{curFilter='gen'+g;this.classList.add('on')}
      renderLanesFiltered()
    };
    fp.appendChild(pill)
  })
}
function renderLanesFiltered(){
  // Custom filter for generation pills
  const lanes=document.getElementById('lanes');
  const q=curSearch.toLowerCase().trim();
  const gens={};
  people.forEach(p=>{
    if(curFilter==='m'&&p.gender!=='m')return;
    if(curFilter==='f'&&p.gender!=='f')return;
    if(curFilter.startsWith('gen')){const gn=parseInt(curFilter.slice(3));if((p.generation||0)!==gn)return}
    if(q&&!p.name.toLowerCase().includes(q))return;
    const g=p.generation||0;if(!gens[g])gens[g]=[];gens[g].push(p)
  });
  let h='';
  Object.keys(gens).sort((a,b)=>a-b).forEach(g=>{
    const ps=gens[g];
    h+=`<div class="glane"><div class="glabel">${GEN_NAMES[+g]||'Gen '+g} <span class="gcnt">${ps.length}</span></div><div class="grow">`;
    ps.forEach(p=>{
      const gc=p.gender==='m'?'gm':p.gender==='f'?'gf':'gu';
      const sc=p.gender==='m'?'m':p.gender==='f'?'f':'u';
      const sp=gSp(p.id);const ck=famCh(p.id);
      const spName=sp.length?sp.map(s=>{const x=byId(s);return x?x.name:''}).join(', '):'';
      const litClass=q&&p.name.toLowerCase().includes(q)?' lit':'';
      h+=`<div class="pc ${gc}${litClass}" onclick="openFV('${p.id}')">`;
      h+=`<div class="cn">${esc(p.name)}</div>`;
      if(spName)h+=`<div class="csub"><span class="csp ${sc}"></span>${esc(spName)}</div>`;
      if(ck.length)h+=`<div class="ckids">${ck.length} ${ck.length===1?'child':'children'}</div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  if(!h)h='<div style="text-align:center;padding:60px 20px;color:var(--ikd)">No matches found</div>';
  lanes.innerHTML=h;
}

// Override setFilter to handle gen pills too
const origSetFilter=setFilter;
window.setFilter=function(btn){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');curFilter=btn.dataset.f;
  if(curFilter.startsWith('gen'))renderLanesFiltered();
  else renderLanes()
};

// ─── INIT ───
const had=loadData();
addGenPills();
renderLanes();
if(had)setTimeout(()=>toast('Loaded · '+people.length+' people','ok'),300);

</script>
